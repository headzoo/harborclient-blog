<footer class="site-footer h-card">
  <data class="u-url" href="{{ '/' | relative_url }}"></data>

  <div class="wrapper">
    <div class="footer-grid">
      <div class="footer-brand">
        <a class="footer-logo-link" href="{{ '/' | relative_url }}">
          <span class="site-logo site-logo--footer" aria-hidden="true">
            <img class="site-logo-mark" src="{{ '/assets/images/site-logo-mark.svg' | relative_url }}" alt="" width="44"
              height="44">
          </span>
          <span class="footer-heading">{{ site.title | escape }}</span>
        </a>
        <p class="footer-tagline">{{ site.description | escape }}</p>
      </div>

      <div class="footer-links">
        <h3 class="footer-label">Connect</h3>
        <ul class="footer-link-list">
          {%- if site.email -%}
          <li><a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a></li>
          {%- endif -%}
          <li><a href="{{ '/feed.xml' | relative_url }}">RSS Feed</a></li>
          <li><a href="{{ '/about/' | relative_url }}">About</a></li>
        </ul>
      </div>
    </div>
  </div>
</footer>
